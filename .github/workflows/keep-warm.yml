name: Keep warm
on:
  schedule:
    # every 10 minutes, 07:00-14:50 UTC (8h business window; shares Render free hours with facturata)
    - cron: "*/10 7-14 * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health
        run: |
          code=$(curl -s -o /tmp/h -w "%{http_code}" --max-time 90 https://certly-api-h15r.onrender.com/health || true)
          echo "health: $code $(cat /tmp/h 2>/dev/null | head -c 120)"
